apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lldap
  namespace: lldap
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ldap.homelab.local
      secretName: lldap-tls
  rules:
    - host: ldap.homelab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lldap-http
                port:
                  number: 80
