---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
  tags: [firewall]

- name: Set ufw default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }
    - { direction: routed,   policy: allow }
  tags: [firewall]

- name: Allow all traffic from cluster peers
  community.general.ufw:
    rule: allow
    src: "{{ hostvars[item].ansible_host }}"
    comment: "cluster peer {{ item }}"
  loop: "{{ groups['cluster'] }}"
  tags: [firewall]

- name: Allow SSH from anywhere on the LAN
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
    src: 192.168.1.0/24
    comment: "ssh from LAN"
  tags: [firewall]

- name: Allow k3s API server from LAN
  community.general.ufw:
    rule: allow
    port: '6443'
    proto: tcp
    src: 192.168.1.0/24
    comment: "k3s API"
  tags: [firewall]

- name: Enable ufw
  community.general.ufw:
    state: enabled
    logging: 'on'
  tags: [firewall]
