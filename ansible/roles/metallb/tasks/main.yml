---
- name: Add MetalLB helm repo
  kubernetes.core.helm_repository:
    name: metallb
    repo_url: https://metallb.github.io/metallb
    state: present

- name: Install MetalLB via Helm
  kubernetes.core.helm:
    name: metallb
    chart_ref: metallb/metallb
    chart_version: "{{ metallb_chart_version }}"
    release_namespace: "{{ metallb_namespace }}"
    create_namespace: true
    state: present
    wait: true
    wait_timeout: 5m

- name: Wait for MetalLB controller to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ metallb_namespace }}"
    name: metallb-controller
  register: metallb_ctrl
  retries: 30
  delay: 10
  until:
    - metallb_ctrl.resources | length > 0
    - metallb_ctrl.resources[0].status.readyReplicas | default(0) | int >= 1

- name: Wait for MetalLB speaker DaemonSet to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: DaemonSet
    namespace: "{{ metallb_namespace }}"
    name: metallb-speaker
  register: metallb_spk
  retries: 30
  delay: 10
  until:
    - metallb_spk.resources | length > 0
    - metallb_spk.resources[0].status.numberReady | default(0) | int == 3

- name: Render IPAddressPool and L2Advertisement
  ansible.builtin.set_fact:
    metallb_pool_yaml: "{{ lookup('template', 'ipaddresspool.yaml.j2') }}"

- name: Apply IPAddressPool and L2Advertisement
  kubernetes.core.k8s:
    state: present
    definition: "{{ item }}"
  loop: "{{ metallb_pool_yaml | from_yaml_all | list }}"
  when: item is not none
