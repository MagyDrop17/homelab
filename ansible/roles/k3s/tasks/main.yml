---
- name: Ensure /etc/rancher/k3s exists
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Template k3s config.yaml
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0600"

- name: Drop kube-vip manifest (init node only)
  when: inventory_hostname in groups['k3s_init']
  block:
    - name: Ensure k3s auto-manifests directory exists
      ansible.builtin.file:
        path: /var/lib/rancher/k3s/server/manifests
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Template kube-vip daemonset
      ansible.builtin.template:
        src: kube-vip-daemonset.yaml.j2
        dest: /var/lib/rancher/k3s/server/manifests/kube-vip.yaml
        owner: root
        group: root
        mode: "0600"

- name: Check if k3s binary is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install k3s server
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_CHANNEL={{ k3s_channel }} \
      INSTALL_K3S_EXEC="server" \
      sh -
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists

- name: Ensure k3s service is enabled and running
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for this node to become Ready
  ansible.builtin.shell: |
    /usr/local/bin/k3s kubectl get node {{ inventory_hostname }} \
      -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  register: node_ready
  retries: 30
  delay: 10
  until: node_ready.stdout == "True"
  changed_when: false
