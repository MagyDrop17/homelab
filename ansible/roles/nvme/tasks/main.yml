---
# Wipes any existing LVM/LINSTOR setup on /dev/nvme0n1 and formats it
# as ext4 mounted at /var/lib/rancher.
#
# This role uses raw `command` modules for LVM teardown because LVM
# modules don't cleanly handle the "tear down a thinpool I don't want"
# case. Every task is marked check_mode: false so the role behaves
# identically in --check and real runs — for a destructive role, lying
# about what would happen is worse than just doing it.

- name: Check if /dev/nvme0n1 exists
  ansible.builtin.stat:
    path: /dev/nvme0n1
  register: nvme_device
  check_mode: false
  tags: [nvme, storage]

- name: Fail if NVMe device is missing
  ansible.builtin.fail:
    msg: "/dev/nvme0n1 not found on {{ inventory_hostname }} — check hardware"
  when: not nvme_device.stat.exists
  tags: [nvme, storage]

- name: Detect filesystem on /dev/nvme0n1
  ansible.builtin.command: blkid -o value -s TYPE /dev/nvme0n1
  register: nvme_fstype
  changed_when: false
  failed_when: false
  check_mode: false
  tags: [nvme, storage]

- name: Detect existing linstor_vg volume group
  ansible.builtin.command: vgs --noheadings -o vg_name linstor_vg
  register: linstor_vg_check
  changed_when: false
  failed_when: false
  check_mode: false
  tags: [nvme, storage]

# --- Teardown phase ---

- name: Remove LINSTOR thinpool LV
  ansible.builtin.command: lvremove -f linstor_vg/thinpool
  when: linstor_vg_check.rc | default(1) == 0
  check_mode: false
  tags: [nvme, storage, lvm-teardown]

- name: Remove LINSTOR volume group
  ansible.builtin.command: vgremove -f linstor_vg
  when: linstor_vg_check.rc | default(1) == 0
  check_mode: false
  tags: [nvme, storage, lvm-teardown]

- name: Remove LVM physical volume signature from /dev/nvme0n1
  ansible.builtin.command: pvremove -f /dev/nvme0n1
  when: nvme_fstype.stdout | default('') == "LVM2_member"
  check_mode: false
  tags: [nvme, storage, lvm-teardown]

- name: Wipe residual filesystem signatures
  ansible.builtin.command: wipefs -a /dev/nvme0n1
  when: nvme_fstype.stdout | default('') == "LVM2_member"
  check_mode: false
  tags: [nvme, storage, lvm-teardown]

# --- Format and mount phase ---

- name: Re-detect filesystem after potential teardown
  ansible.builtin.command: blkid -o value -s TYPE /dev/nvme0n1
  register: nvme_fstype_after
  changed_when: false
  failed_when: false
  check_mode: false
  tags: [nvme, storage]

- name: Create ext4 filesystem on /dev/nvme0n1
  community.general.filesystem:
    fstype: ext4
    dev: /dev/nvme0n1
    opts: -L k3s-data
  when: nvme_fstype_after.stdout | default('') != "ext4"
  check_mode: false
  tags: [nvme, storage]

- name: Stop k3s before remounting (if running)
  ansible.builtin.systemd:
    name: k3s
    state: stopped
  failed_when: false
  changed_when: false
  check_mode: false
  tags: [nvme, storage]

- name: Ensure /var/lib/rancher mount point exists
  ansible.builtin.file:
    path: /var/lib/rancher
    state: directory
    owner: root
    group: root
    mode: '0755'
  check_mode: false
  tags: [nvme, storage]

- name: Get UUID of the formatted NVMe
  ansible.builtin.command: blkid -o value -s UUID /dev/nvme0n1
  register: nvme_uuid
  changed_when: false
  check_mode: false
  tags: [nvme, storage]

- name: Mount NVMe at /var/lib/rancher and persist in /etc/fstab
  ansible.posix.mount:
    path: /var/lib/rancher
    src: "UUID={{ nvme_uuid.stdout }}"
    fstype: ext4
    opts: defaults,noatime
    state: mounted
  check_mode: false
  tags: [nvme, storage]
