---
- name: Add longhorn helm repo
  kubernetes.core.helm_repository:
    name: longhorn
    repo_url: https://charts.longhorn.io
    state: present

- name: Install Longhorn via Helm
  kubernetes.core.helm:
    name: longhorn
    chart_ref: longhorn/longhorn
    chart_version: "{{ longhorn_chart_version }}"
    release_namespace: "{{ longhorn_namespace }}"
    create_namespace: true
    state: present
    wait: true
    wait_timeout: 15m
    values:
      defaultSettings:
        defaultDataPath: "{{ longhorn_data_path }}"
        defaultReplicaCount: "{{ longhorn_default_replica_count }}"
        replicaSoftAntiAffinity: "false"
        replicaZoneSoftAntiAffinity: "true"
        replicaAutoBalance: "best-effort"
        storageOverProvisioningPercentage: 100
        storageMinimalAvailablePercentage: 15
        upgradeChecker: "false"
        allowRecurringJobWhileVolumeDetached: "true"
        concurrentAutomaticEngineUpgradePerNodeLimit: 0
        defaultLonghornStaticStorageClass: "longhorn"
        disableSchedulingOnCordonedNode: "true"
        orphanAutoDeletion: "true"
      persistence:
        defaultClass: true
        defaultClassReplicaCount: "{{ longhorn_default_replica_count }}"
        defaultDataLocality: "best-effort"
      ingress:
        enabled: false
      service:
        ui:
          type: ClusterIP

- name: Wait for longhorn-manager DaemonSet to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: DaemonSet
    namespace: "{{ longhorn_namespace }}"
    name: longhorn-manager
  register: lh_mgr
  retries: 60
  delay: 10
  until:
    - lh_mgr.resources | length > 0
    - lh_mgr.resources[0].status.numberReady | default(0) | int == 3

- name: Wait for longhorn-driver-deployer to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ longhorn_namespace }}"
    name: longhorn-driver-deployer
  register: lh_drv
  retries: 30
  delay: 10
  until:
    - lh_drv.resources | length > 0
    - lh_drv.resources[0].status.readyReplicas | default(0) | int >= 1

- name: Wait for longhorn StorageClass to exist
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: StorageClass
    name: longhorn
  register: lh_sc
  retries: 20
  delay: 5
  until:
    - lh_sc.resources | length > 0

- name: Remove default annotation from local-path StorageClass
  kubernetes.core.k8s:
    state: patched
    api_version: storage.k8s.io/v1
    kind: StorageClass
    name: local-path
    definition:
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "false"

- name: Ensure longhorn StorageClass is marked default
  kubernetes.core.k8s:
    state: patched
    api_version: storage.k8s.io/v1
    kind: StorageClass
    name: longhorn
    definition:
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"

- name: Compute bcrypt hash for Longhorn UI basic auth
  ansible.builtin.shell: >-
    htpasswd -nbB "{{ longhorn_ui_basic_auth_user }}"
    "{{ longhorn_ui_basic_auth_password }}"
  register: htpasswd_out
  changed_when: false
  no_log: true

- name: Base64-encode the htpasswd line for the Secret
  ansible.builtin.set_fact:
    longhorn_ui_htpasswd_b64: "{{ htpasswd_out.stdout | b64encode }}"
  no_log: true

- name: Render Longhorn UI Ingress + auth Secret
  ansible.builtin.set_fact:
    longhorn_ui_yaml: "{{ lookup('template', 'ui-ingress.yaml.j2') }}"

- name: Apply Longhorn UI auth Secret and Ingress
  kubernetes.core.k8s:
    state: present
    definition: "{{ item }}"
  loop: "{{ longhorn_ui_yaml | from_yaml_all | list }}"
  when: item is not none
  no_log: true

- name: Wait for Longhorn UI TLS certificate to be issued
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: Certificate
    namespace: "{{ longhorn_namespace }}"
    name: longhorn-ui-tls
  register: lh_cert
  retries: 30
  delay: 10
  until:
    - lh_cert.resources | length > 0
    - (lh_cert.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length) > 0
