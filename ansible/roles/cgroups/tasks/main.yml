---
- name: Read current cmdline.txt
  ansible.builtin.slurp:
    src: /boot/firmware/cmdline.txt
  register: cmdline_raw
  tags: [cgroups, kernel]

- name: Decode cmdline.txt content
  ansible.builtin.set_fact:
    cmdline_current: "{{ cmdline_raw.content | b64decode | trim }}"
  tags: [cgroups, kernel]

- name: Build desired cmdline with cgroup parameters
  ansible.builtin.set_fact:
    cmdline_desired: >-
      {{ cmdline_current }}
      {% for param in cgroup_params if param not in cmdline_current %}
      {{ param }}
      {% endfor %}
  vars:
    cgroup_params:
      - "cgroup_memory=1"
      - "cgroup_enable=memory"
      - "cgroup_enable=cpuset"
  tags: [cgroups, kernel]

- name: Normalize cmdline (single line, single spaces)
  ansible.builtin.set_fact:
    cmdline_desired: "{{ cmdline_desired.split() | join(' ') }}"
  tags: [cgroups, kernel]

- name: Write cmdline.txt if changed
  ansible.builtin.copy:
    dest: /boot/firmware/cmdline.txt
    content: "{{ cmdline_desired }}\n"
    owner: root
    group: root
    mode: '0755'
  when: cmdline_desired != cmdline_current
  notify: reboot pi
  tags: [cgroups, kernel]
